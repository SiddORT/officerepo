services:
  postgres:
    image: postgres:16-alpine
    container_name: officerepo_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - officerepo

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    container_name: officerepo_backend

    build:
      context: .
      dockerfile: backend/Dockerfile

    restart: unless-stopped

    ports:
      - "9000:8000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - officerepo

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    container_name: officerepo_frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_DOMAIN: ${VITE_BASE_DOMAIN}

    restart: unless-stopped

    ports:
      - "3003:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - officerepo

networks:
  officerepo:
    driver: bridge

volumes:
  postgres_data:
    driver: local