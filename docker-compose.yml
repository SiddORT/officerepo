services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "9000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL
      - SESSION_SECRET
      - JWT_SECRET
      - REFRESH_SECRET
      - ENVIRONMENT=${ENVIRONMENT:-development}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - officerepo
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - officerepo

networks:
  officerepo:
    driver: bridge
